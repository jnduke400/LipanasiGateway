input {
  tcp {
    port => 5000
    codec => json_lines
    type => "lipanasi_payment_logs"
  }
}

filter {
  if [type] == "lipanasi_payment_logs" {
    json {
      source => "message"
    }
    date {
      match => [ "timestamp", "ISO8601" ]
      target => "@timestamp"
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "lipanasi-payment-%{+YYYY.MM.dd}"
  }
  stdout { codec => rubydebug }
}
