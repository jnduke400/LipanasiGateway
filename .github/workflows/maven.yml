name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean install -DskipTests

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Build & push Docker image
        uses: mr-smithers-excellent/docker-build-push@v5
        with:
          image: ndukedocker/lipanasi-payment-gw-engine
          tags: latest
          registry: docker.io
          dockerfile: payments.Dockerfile
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Copy files and setup environment
        run: |
          {
            echo "DB_USERNAME: ${{secrets.DB_USERNAME}}"
            echo "DB_PASSWORD: ${{secrets.DB_PASSWORD}}"
            echo "DB_ROOT_PASSWORD: ${{secrets.DB_ROOT_PASSWORD}}"
            echo "DB_NAME: ${{secrets.DB_NAME}}"
            echo "DB_REPLICATION_USER: ${{secrets.DB_REPLICATION_USER}}"
            echo "DB_REPLICATION_PASSWORD: ${{secrets.DB_REPLICATION_PASSWORD}}"
            echo "RMQ_USERNAME: ${{secrets.RMQ_USERNAME}}"
            echo "RMQ_PASSWORD: ${{secrets.RMQ_PASSWORD}}"
            echo "APP_SECRET_KEY: ${{secrets.APP_SECRET_KEY}}"
            echo "DB_TIMEZONE: ${{secrets.DB_TIMEZONE}}"
            echo "LIPANASI_BUSINESS_API_BASE_URL: ${{secrets.LIPANASI_BUSINESS_API_BASE_URL}}"
            echo "NETWORK_CONFIG_URL: ${{secrets.NETWORK_CONFIG_URL}}"
            echo "ORDER_SESSION_EXPIRY: ${{secrets.ORDER_SESSION_EXPIRY}}"
            echo "PARTNER_VALIDATION_URL: ${{secrets.PARTNER_VALIDATION_URL}}"
            echo "PRIMARY_DB_URL: ${{secrets.PRIMARY_DB_URL}}"
            echo "REDIS_PASSWORD: ${{secrets.REDIS_PASSWORD}}"
            echo "REPLICA_DB_URL: ${{secrets.REPLICA_DB_URL}}"
            echo "RMQ_HOST: ${{secrets.RMQ_HOST}}"
            echo "RMQ_PORT: ${{secrets.RMQ_PORT}}"
            echo "RMQ_PASSWORD: ${{secrets.RMQ_PASSWORD}}"
            echo "RMQ_PROD_PASSWORD: ${{secrets.RMQ_PROD_PASSWORD}}"
            echo "RMQ_PROD_USERNAME: ${{secrets.RMQ_PROD_USERNAME}}"
            echo "RMQ_USERNAME: ${{secrets.RMQ_USERNAME}}"
            echo "THREAD_POOL_CORE_SIZE: ${{secrets.THREAD_POOL_CORE_SIZE}}"
            echo "THREAD_POOL_KEEP_ALIVE_TIME: ${{secrets.THREAD_POOL_KEEP_ALIVE_TIME}}"
            echo "THREAD_POOL_MAX_SIZE: ${{secrets.THREAD_POOL_MAX_SIZE}}"
            echo "THREAD_POOL_QUEUE_CAPACITY: ${{secrets.THREAD_POOL_QUEUE_CAPACITY}}"
          } > .env

      - name: Deploy to Server
        env:
          SERVER_HOST: ${{ secrets.HA_PROXY_IP }}
          SERVER_USER: ${{ secrets.HA_PROXY_USER }}
          SERVER_PORT: ${{ secrets.HA_PROXY_PORT }}
          SERVER_PASS: ${{ secrets.HA_PROXY_PASSWORD }}
          DEPLOY_PATH: ${{ secrets.HA_PROXY_BASE_DIRECTORY }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          INST_TWO_PASS: ${{ secrets.REMOTE_PASSWORD_INST_2 }}
          INST_TWO_USER: ${{ secrets.REMOTE_USER_INST_2 }}
          INST_TWO_IP: ${{ secrets.REMOTE_IP_INST_2 }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          export SSHPASS=$SERVER_PASS

          # Create deployment directory
          sshpass -e ssh -o StrictHostKeyChecking=no -p $SERVER_PORT $SERVER_USER@$SERVER_HOST "mkdir -p $DEPLOY_PATH"

          # Write env vars to remote file using printf
          sshpass -e ssh -o StrictHostKeyChecking=no -p $SERVER_PORT $SERVER_USER@$SERVER_HOST \
            "printf 'SUDO_PASSWORD=%s\nREMOTE_PASSWORD=%s\nDOCKER_PASSWORD=%s\nREMOTE_PATH=%s\n' \"$SERVER_PASS\" \"$SERVER_PASS\" \"$DOCKER_PASSWORD\" \"$DEPLOY_PATH\" > $DEPLOY_PATH/.deploy-env"

          # Copy deployment files
          for file in deploy.sh redis-cluster-setup-script.sh mysql.Dockerfile dhub_password.txt healthcheck.sh .env docker-compose-payment-gw.yaml docker-compose-redis-cluster.yaml docker-compose-lipanasi-elk-stack.yaml; do
            if [ -f "$file" ]; then
              sshpass -e scp -o StrictHostKeyChecking=no -P $SERVER_PORT "$file" "$SERVER_USER@$SERVER_HOST:$DEPLOY_PATH"
            else
              echo "Warning: $file not found, skipping..."
            fi
          done

          # Create Logstash directories
          echo "Creating Logstash directories on server..."
          sshpass -e ssh -o StrictHostKeyChecking=no -p $SERVER_PORT "$SERVER_USER@$SERVER_HOST" \
            "mkdir -p $DEPLOY_PATH/logstash/config $DEPLOY_PATH/logstash/pipeline"

          # Copy Logstash config files
          echo "Copying Logstash config files..."
          if [ -d "logstash/config" ]; then
            sshpass -e scp -o StrictHostKeyChecking=no -P $SERVER_PORT logstash/config/* "$SERVER_USER@$SERVER_HOST:$DEPLOY_PATH/logstash/config/"
          else
            echo "Warning: logstash/config directory not found, skipping..."
          fi

          # Copy Logstash pipeline files
          echo "Copying Logstash pipeline files..."
          if [ -d "logstash/pipeline" ]; then
            sshpass -e scp -o StrictHostKeyChecking=no -P $SERVER_PORT logstash/pipeline/* "$SERVER_USER@$SERVER_HOST:$DEPLOY_PATH/logstash/pipeline/"
          else
            echo "Warning: logstash/pipeline directory not found, skipping..."
          fi

          # Run deploy.sh
          sshpass -e ssh -o StrictHostKeyChecking=no -p $SERVER_PORT $SERVER_USER@$SERVER_HOST \
            "cd $DEPLOY_PATH && source .deploy-env && chmod +x deploy.sh && ./deploy.sh"

          # Run redis cluster setup
          sshpass -e ssh -o StrictHostKeyChecking=no -p $SERVER_PORT $SERVER_USER@$SERVER_HOST \
            "cd $DEPLOY_PATH && source .deploy-env && chmod +x redis-cluster-setup-script.sh && ./redis-cluster-setup-script.sh"
